# macOS GUI pinentry — also works from non-TTY contexts (Claude, IDEs, hooks)
pinentry-program /opt/homebrew/bin/pinentry-mac

# Cache YubiKey PIN for 24h so signing doesn't re-prompt during a working day.
# default resets on each use; max is the hard ceiling from first entry.
default-cache-ttl 86400
max-cache-ttl 86400
